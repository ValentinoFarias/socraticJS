services:
  php:
    build: ./docker/php
    container_name: jstutor_php
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    networks:
      - jstutor_net

  db:
    image: mysql:8.0
    container_name: jstutor_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: jstutor
      MYSQL_USER: jstutor_user
      MYSQL_PASSWORD: jstutor_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jstutor_net

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: jstutor_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: jstutor_user
      PMA_PASSWORD: jstutor_pass
    depends_on:
      - db
    networks:
      - jstutor_net

volumes:
  db_data:

networks:
  jstutor_net:
    driver: bridge
